experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/{0}/train_mapped.tsv
    validation_path: ../data/{0}/val_mapped.tsv
    test_path: ../data/{0}/test_mapped.tsv
    side_information:
      - dataloader: VisualAttribute
        visual_features: ../data/{0}/eos_embeddings_2024_12_16_10_03_27_indexed
  dataset: baby
  top_k: 20
  evaluation:
    cutoffs: 20
    simple_metrics: [Recall, nDCG, HR]
    relevance_threshold: 4
  gpu: 0
  external_models_path: ../external/models/__init__.py
  models:
    external.BM3:
      meta:
        hyper_opt_alg: grid
        verbose: True
        save_weights: False
        save_recs: True
        validation_rate: 10
        validation_metric: Recall@20
        restore: False
      lr: [0.0001, 0.0005, 0.001, 0.005, 0.01]
      factors:  256
      reg_weight: [0.01, 0.1]
      cl_weight: 2.0
      dropout: 0.3
      n_layers: 2
      modalities: ('visual', )
      loaders: ('VisualAttribute', )
      epochs: 200
      lr_sched: (1.0,50)
      batch_size: 1024
      seed: 123
      extractor: qwen2vl